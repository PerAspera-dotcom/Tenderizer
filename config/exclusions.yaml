# Active exclusion rules — a notice tripping one of these is dropped with the given
# reason (recorded on the record as `exclude_reason`, not silently deleted), even if it
# also matched a tent/shelter CPV code or keyword. Same accent/case-insensitive whole-word
# matching as config/keywords.yaml (see src/match.py).

# F3 (CR-001, D5-confirmed) — container / modular / prefabricated structures.
# CPV codes cross-checked against cpv_reference.json (groups: prefab_modular, mobile_containers).
container_modular_prefab:
  codes:
    - "44211000"   # Prefabricated buildings
    - "44211100"   # Modular and portable buildings
    - "44211110"   # Cabins
    - "44211200"   # Cubicles
    - "45223800"   # Assembly and erection of prefabricated structures
    - "45223810"   # Prefabricated constructions
    - "34221000"   # Special-purpose mobile containers
  terms:
    en: [container, containers, modular, prefabricated]
    fr: [conteneur, conteneurs, modulaire, prefabrique, prefabriques,
         prefabriquee, prefabriquees, prefabrication]
    nl: [container, containers, modulair, prefab, geprefabriceerd]
    de: [Container, Containergebäude, Großbehälter, modular, vorgefertigt, vorgefertigte,
         vorgefertigten, Fertigkonstruktion, Fertigkonstruktionen,
         # ue/ae/oe/ss transliterations:
         Containergebaeude, Grossbehaelter]

# F2 (CR-001) — rental tenders. FR 'location' is scoped to rental-shaped phrases
# ('location de', 'en location') rather than the bare word: 'location' alone is also
# plain French for "place", and a bare-word match would misfire on a tent PURCHASE
# notice that happens to use the word that way (see CR §F2 Watch note; tested by
# "Acquisition de tentes" staying kept in tests/test_12_filters.py).
rental:
  terms:
    en: [rental]
    fr: [location de, en location]
    nl: [huur]
    de: [Miete]
  # Candidates raised at the meeting, not yet confirmed by the customer — do not activate:
  # it: [noleggio]
  # pl: [wynajem]
