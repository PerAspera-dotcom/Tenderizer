# Verified against the official EU CPV 2008 vocabulary (the uploaded CPV2008 xls files).
# Broad selection across the tent / cover / shelter / portable-structure domain.
# Full metadata (official EN/FR/NL labels, group, category) lives in cpv_reference.json.
# Note: no dedicated "military tent" CPV exists — military tents = 39522530 + defence buyer.
