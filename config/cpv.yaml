  - "39522110"   # Tarpaulins
  - "39522120"   # Awnings
  - "39522130"   # Sunblinds
  - "39522200"   # Camouflage covers
  - "39522500"   # Textile camping goods
  - "39522530"   # Tents
  - "33163000"   # Tent for medical use
  - "37414300"   # Tent repair kits
